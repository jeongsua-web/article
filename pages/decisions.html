    // --- Render helpers ---
    const colorClass = (c) => ({
      sky:    ['bg-sky-50','text-sky-700','border-sky-100','bg-sky-600'],
      violet: ['bg-violet-50','text-violet-700','border-violet-100','bg-violet-600'],
      fuchsia:['bg-fuchsia-50','text-fuchsia-700','border-fuchsia-100','bg-fuchsia-600'],
      teal:   ['bg-teal-50','text-teal-700','border-teal-100','bg-teal-600'],
      amber:  ['bg-amber-50','text-amber-700','border-amber-100','bg-amber-500'],
      rose:   ['bg-rose-50','text-rose-700','border-rose-100','bg-rose-600'],
      indigo: ['bg-indigo-50','text-indigo-700','border-indigo-100','bg-indigo-600'],
    }[c]);

    const pad = (n) => String(n).padStart(4, '0');

    function statusBadge(a) {
      if (a.status === 'Superseded')
        return `<span class="text-[10px] font-bold uppercase tracking-wide text-amber-700 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded-full">Superseded</span>`;
      return `<span class="text-[10px] font-bold uppercase tracking-wide text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">Accepted</span>`;
    }

    // Stats
    document.getElementById('stat-total').textContent = ADRS.length;
    document.getElementById('stat-accepted').textContent = ADRS.filter(a => a.status === 'Accepted').length;
    document.getElementById('stat-superseded').textContent = ADRS.filter(a => a.status === 'Superseded').length;

    // Filters
    let activeFilter = 'all';
    const filterBox = document.getElementById('filters');
    function renderFilters() {
      const chips = [['all', '전체 ' + ADRS.length]];
      Object.entries(CATS).forEach(([k, v]) => {
        const n = ADRS.filter(a => a.cat === k).length;
        if (n) chips.push([k, v.label + ' ' + n]);
      });
      filterBox.innerHTML = chips.map(([k, label]) => {
        const on = k === activeFilter;
        return `<button onclick="setFilter('${k}')" class="px-3.5 py-1.5 text-xs font-semibold rounded-full border transition-all ${on ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-600 border-slate-200 hover:border-slate-300'}">${label}</button>`;
      }).join('');
    }
    function setFilter(k) { activeFilter = k; renderFilters(); renderList(); }

    // List
    const listBox = document.getElementById('adr-list');
    function renderList() {
      const items = ADRS.filter(a => activeFilter === 'all' || a.cat === activeFilter);
      listBox.innerHTML = items.map(a => {
        const [cBg, cTxt, cBor, cSolid] = colorClass(CATS[a.cat].color);
        const dimmed = a.status === 'Superseded' ? 'opacity-80' : '';
        return `
        <button onclick="openModal(${a.id})" class="w-full text-left bg-white rounded-2xl border border-slate-200 p-5 shadow-sm hover:shadow-md hover:border-slate-300 hover:-translate-y-0.5 transition-all duration-150 group ${dimmed}">
          <div class="flex items-start gap-4">
            <div class="flex-1 min-w-0">
              <div class="flex items-center flex-wrap gap-2 mb-1.5">
                <span class="text-[11px] font-bold text-slate-400 font-mono">ADR-${pad(a.id)}</span>
                <span class="text-[10px] font-semibold ${cBg} ${cTxt} border ${cBor} px-2 py-0.5 rounded-full">${CATS[a.cat].label}</span>
                ${statusBadge(a)}
                <span class="text-[11px] text-slate-400 ml-auto"><i class="fa-regular fa-calendar mr-1"></i>${a.date}</span>
              </div>
              <h3 class="font-bold text-slate-900 text-[15px] leading-snug ${a.status === 'Superseded' ? 'line-through decoration-slate-300' : ''}">${a.title}</h3>
              <p class="text-slate-500 text-sm mt-1.5 leading-relaxed">${a.decision}</p>
              <span class="inline-flex items-center gap-1.5 text-xs font-semibold ${cTxt} mt-3 group-hover:gap-2.5 transition-all">
                배경·대안 자세히 보기 <i class="fa-solid fa-arrow-right text-[10px]"></i>
              </span>
            </div>
          </div>
        </button>`;
      }).join('');
    }

    // Modal
    function section(title, icon, inner) {
      return `<div class="mb-6">
        <p class="flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-slate-400 mb-2.5"><i class="fa-solid ${icon}"></i>${title}</p>
        ${inner}
      </div>`;
    }
    function openModal(id) {
      const a = ADRS.find(x => x.id === id);
      const [cBg, cTxt, cBor, cSolid] = colorClass(CATS[a.cat].color);
      document.getElementById('modal-header').innerHTML = `
        <div class="flex items-center flex-wrap gap-2 mb-1.5">
          <span class="text-[11px] font-bold text-slate-400 font-mono">ADR-${pad(a.id)}</span>
          <span class="text-[10px] font-semibold ${cBg} ${cTxt} border ${cBor} px-2 py-0.5 rounded-full">${CATS[a.cat].label}</span>
          ${statusBadge(a)}
          <span class="text-[11px] text-slate-400">${a.date}</span>
        </div>
        <h2 class="text-lg font-black text-slate-900 leading-snug">${a.title}</h2>`;

      let body = '';

      if (a.status === 'Superseded' && a.supersededNote) {
        body += `<div class="flex items-start gap-2.5 bg-amber-50 border border-amber-200 rounded-2xl px-4 py-3 mb-6">
          <i class="fa-solid fa-triangle-exclamation text-amber-500 mt-0.5"></i>
          <p class="text-sm text-amber-800 leading-relaxed"><strong>대체됨 →</strong> ${a.supersededNote}</p>
        </div>`;
      }

      body += section('배경', 'fa-circle-info',
        `<p class="text-sm text-slate-600 leading-relaxed">${a.background}</p>`);

      body += section('고려한 대안', 'fa-code-compare',
        `<div class="space-y-2">${a.alts.map(([name, desc]) => {
          const chosen = name.includes('채택');
          return `<div class="rounded-xl border ${chosen ? cBor + ' ' + cBg : 'border-slate-200 bg-slate-50'} p-3.5">
            <p class="font-bold text-sm ${chosen ? cTxt : 'text-slate-700'} flex items-center gap-1.5">${chosen ? '<i class="fa-solid fa-circle-check"></i>' : ''}${name}</p>
            <p class="text-xs text-slate-500 mt-1 leading-relaxed">${desc}</p>
          </div>`;
        }).join('')}</div>`);

      body += section('결정', 'fa-gavel',
        `<div class="rounded-2xl ${cBg} border ${cBor} p-4"><p class="text-sm font-semibold ${cTxt} leading-relaxed">${a.decision}</p></div>`);

      body += section('선택 이유', 'fa-lightbulb',
        `<ul class="space-y-1.5">${a.reasons.map(r => `<li class="flex items-start gap-2 text-sm text-slate-600"><i class="fa-solid fa-check text-emerald-500 mt-1 text-xs"></i><span class="leading-relaxed">${r}</span></li>`).join('')}</ul>`);

      body += section('결과 · 영향', 'fa-scale-balanced',
        `<div class="grid sm:grid-cols-2 gap-3">
          <div class="rounded-xl bg-emerald-50 border border-emerald-100 p-3.5">
            <p class="text-xs font-bold text-emerald-700 mb-2"><i class="fa-solid fa-plus mr-1"></i>긍정</p>
            <ul class="space-y-1.5">${a.pos.map(p => `<li class="text-xs text-slate-600 leading-relaxed">· ${p}</li>`).join('')}</ul>
          </div>
          <div class="rounded-xl bg-rose-50 border border-rose-100 p-3.5">
            <p class="text-xs font-bold text-rose-700 mb-2"><i class="fa-solid fa-minus mr-1"></i>제약 / 트레이드오프</p>
            <ul class="space-y-1.5">${a.neg.map(p => `<li class="text-xs text-slate-600 leading-relaxed">· ${p}</li>`).join('')}</ul>
          </div>
        </div>`);

      document.getElementById('modal-body').innerHTML = body;
      const modal = document.getElementById('modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      document.body.classList.add('modal-open');
    }
    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.body.classList.remove('modal-open');
    }
    document.getElementById('modal').addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    renderFilters();
    renderList();
  </script>
</body>
