/* ─── WBS TABLE ─────────────────────────────────── */
function renderTable() {
  const rows = WBS.map(r => {
    if (r.parent) {
      return `<tr class="wbs-row border-b border-slate-200 bg-slate-50">
        <td class="px-5 py-3 font-mono text-xs font-bold text-slate-600">${r.code}</td>
        <td class="px-5 py-3 font-bold text-slate-900 text-sm">${r.name}</td>
        <td class="px-5 py-3 text-slate-400 text-xs hidden sm:table-cell">${r.dur}</td>
        <td class="px-5 py-3">${ST_BADGE[r.st]}</td></tr>`;
    }
    if (r.sub) {
      return `<tr class="wbs-row border-b border-slate-100 bg-slate-50/40">
        <td class="px-5 py-2 font-mono text-xs text-slate-500 pl-8">${r.code}</td>
        <td class="px-5 py-2 font-semibold text-slate-700 text-xs pl-8">${r.name}</td>
        <td class="px-5 py-2 text-slate-400 text-xs hidden sm:table-cell">${r.dur}</td>
        <td class="px-5 py-2">${ST_BADGE[r.st]}</td></tr>`;
    }
    return `<tr class="wbs-row border-b border-slate-100">
      <td class="px-5 py-2.5 font-mono text-xs text-slate-400 pl-14">${r.code}</td>
      <td class="px-5 py-2.5 text-slate-700 text-sm pl-14">${r.name}</td>
      <td class="px-5 py-2.5 text-slate-400 text-xs hidden sm:table-cell">${r.dur}</td>
      <td class="px-5 py-2.5">${ST_BADGE[r.st]}</td></tr>`;
  }).join('');
  document.getElementById('wbs-body').innerHTML = rows;

  // stats
  const leaf = WBS.filter(r => !r.parent && !r.sub);
  document.getElementById('cnt-done-stat').textContent = leaf.filter(r=>r.st==='done').length;
  document.getElementById('cnt-inprog-stat').textContent = leaf.filter(r=>r.st==='inProgress').length;
  document.getElementById('cnt-todo-stat').textContent = leaf.filter(r=>r.st==='todo').length;
}

/* ─── KANBAN ─────────────────────────────────────── */
const LS_KEY = 'ab-kanban-v3';
let kState, dragId;

function loadKState() {
  const s = localStorage.getItem(LS_KEY);
  if (s) return JSON.parse(s);
  const d = {done:[],inProgress:[],todo:[],should:[]};
  TASKS.forEach(t => d[t.col].push(t.id));
  return d;
}
function saveKState() { localStorage.setItem(LS_KEY, JSON.stringify(kState)); }
function resetKanban() { localStorage.removeItem(LS_KEY); renderKanban(); }

function renderKanban() {
  kState = loadKState();
  ['done','inProgress','todo','should'].forEach(col => {
    const el = document.getElementById('kcol-'+col);
    el.innerHTML = '';
    (kState[col]||[]).forEach(id => {
      const t = TASKS.find(x=>x.id===id);
      if (!t) return;
      const card = document.createElement('div');
      card.className = 'kanban-card';
      card.draggable = true;
      card.dataset.id = id;
      const tc = TAG_CLS[t.tag] || 'bg-slate-100 text-slate-600';
      card.innerHTML = `
        <div class="flex items-center justify-between mb-1.5">
          <span class="font-mono text-xs text-slate-400">${t.code}</span>
          <span class="text-xs font-semibold px-1.5 py-0.5 rounded-md ${tc}">${t.tag}</span>
        </div>
        <p class="text-sm font-semibold text-slate-800 leading-snug mb-1.5">${t.name}</p>
        <p class="text-xs text-slate-400"><i class="fa-regular fa-clock mr-1"></i>${t.dur}</p>`;
      card.addEventListener('dragstart', e => {
        dragId = id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      el.appendChild(card);
    });
    document.getElementById('kcnt-'+col).textContent = (kState[col]||[]).length;
  });
}

function drop(e, col) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  ['done','inProgress','todo','should'].forEach(c => kState[c]=(kState[c]||[]).filter(id=>id!==dragId));
  kState[col].push(dragId);
  dragId = null;
  saveKState();
  renderKanban();
}
function dragEnter(e) { e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

/* ─── iOS CALENDAR ───────────────────────────────── */
function renderIOSCalendar(containerId, year, month) {
  const daysInMonth = new Date(year, month, 0).getDate();
  const firstOffset = (new Date(year, month - 1, 1).getDay() + 6) % 7; // Mon=0
  const todayStr = new Date().toISOString().slice(0, 10);

  // Build weeks array: each entry is {day, date} or null
  const weeks = [];
  let week = Array(firstOffset).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    week.push({ day: d, date: ds });
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }

  // Filter events for this month
  const mStart = `${year}-${String(month).padStart(2,'0')}-01`;
  const mEnd   = `${year}-${String(month).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
  const mEvts  = EVENTS.filter(e => e.start <= mEnd && e.end >= mStart)
                       .sort((a, b) => a.start.localeCompare(b.start));

  // Greedy lane assignment: no two events in the same lane overlap
  mEvts.forEach(e => { e._lane = -1; });
  const lanes = [];
  mEvts.forEach(ev => {
    let l = 0;
    for (;;) {
      if (!lanes[l]) lanes[l] = [];
      if (!lanes[l].some(e => !(ev.end < e.start || ev.start > e.end))) {
        lanes[l].push(ev); ev._lane = l; break;
      }
      l++;
    }
  });

  const DAY_NAMES = ['월','화','수','목','금','토','일'];
  let html = '<div class="ios-cal">';
  html += `<div class="ios-hdr">${DAY_NAMES.map(d=>`<div>${d}</div>`).join('')}</div>`;

  weeks.forEach(week => {
    const nonNull = week.filter(Boolean);
    if (!nonNull.length) return;
    const wFirst = nonNull[0].date;
    const wLast  = nonNull[nonNull.length - 1].date;
    const weekHasEvt = mEvts.some(e => e.start <= wLast && e.end >= wFirst);

    html += '<div class="ios-week">';

    // Day-number row
    html += '<div class="ios-drow">';
    week.forEach((c, i) => {
      if (!c) { html += '<div class="ios-dc"></div>'; return; }
      const isToday = c.date === todayStr;
      const nc = isToday ? 'ios-n ios-n-today'
               : i === 5 ? 'ios-n ios-n-sat'
               : i === 6 ? 'ios-n ios-n-sun'
               :           'ios-n';
      html += `<div class="ios-dc"><span class="${nc}">${c.day}</span></div>`;
    });
    html += '</div>';

    // Event lane rows
    if (weekHasEvt) {
      lanes.forEach(lane => {
        // Build a 7-slot cell map for this lane × this week
        const cells = Array(7).fill(null);
        lane.forEach(ev => {
          let sc = -1, ec = -1;
          week.forEach((c, i) => {
            if (!c) return;
            if (c.date >= ev.start && c.date <= ev.end) {
              if (sc === -1) sc = i;
              ec = i;
            }
          });
          if (sc === -1) return;
          cells[sc] = {
            ev,
            span: ec - sc + 1,
            isStart: nonNull.some(c => c.date === ev.start),
            isEnd:   nonNull.some(c => c.date === ev.end),
          };
          for (let i = sc + 1; i <= ec; i++) cells[i] = 'X';
        });

        // Only render if lane has something in this week
        if (!cells.some(c => c && c !== 'X')) return;

        html += '<div class="ios-erow">';
        for (let col = 0; col < 7; col++) {
          if (cells[col] === 'X') continue;
          if (!cells[col]) {
            html += `<div class="ios-sp" style="grid-column:${col+1}"></div>`;
          } else {
            const { ev, span, isStart, isEnd } = cells[col];
            const clr = ECOLORS[ev.color] || ECOLORS.todo;
            const rl = isStart ? '6px' : '2px';
            const rr = isEnd   ? '6px' : '2px';
            // Subtle left-edge marker when continuing from previous week
            const leftBorder = !isStart ? `border-left:2px solid rgba(255,255,255,.4);` : '';
            html += `<div class="ios-bar" style="grid-column:${col+1}/${col+1+span};background:${clr.bg};color:${clr.text};border-radius:${rl} ${rr} ${rr} ${rl};${leftBorder}">${ev.label}</div>`;
          }
        }
        html += '</div>';
      });
    }

    html += '</div>'; // ios-week
  });

  html += '</div>';
  document.getElementById(containerId).innerHTML = html;
}

/* ─── VIEW SWITCH ────────────────────────────────── */
function showView(v) {
  ['table','kanban','calendar'].forEach(x => {
    document.getElementById('view-'+x).classList.toggle('hidden', x!==v);
    document.getElementById('btn-'+x).classList.toggle('active', x===v);
  });
  if (v==='kanban') renderKanban();
  if (v==='calendar') { renderIOSCalendar('cal-may',2026,5); renderIOSCalendar('cal-june',2026,6); }
}

document.getElementById('dday').textContent = diff > 0 ? diff : '마감!';
